name: Release

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt pyinstaller

      - name: Create config.py from secrets
        env:
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
        run: |
          Set-Content config.py 'class Config(object):'
          Add-Content config.py "    DATABASE_NAME = ""$env:DB_NAME"""
          Add-Content config.py "    DATABASE_USER = ""$env:DB_USER"""
          Add-Content config.py "    DATABASE_PASSWORD = ""$env:DB_PASSWORD"""
          Add-Content config.py "    DATABASE_HOST = ""$env:DB_HOST"""
          Add-Content config.py "    DATABASE_PORT = ""$env:DB_PORT"""

      - run: >
          pyinstaller
          --onefile
          --windowed
          --hidden-import=pymysql
          --hidden-import=sqlalchemy.dialects.mysql
          --hidden-import=sqlalchemy.ext.automap
          --name YandexMapsScraper
          main.py

      - uses: actions/upload-artifact@v4
        with:
          name: YandexMapsScraper-windows
          path: dist/YandexMapsScraper.exe
          retention-days: 30
