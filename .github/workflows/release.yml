name: Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Create config.py from secrets
        shell: pwsh
        env:
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
        run: |
          @"
          class Config(object):
              DATABASE_NAME = "$env:DB_NAME"
              DATABASE_USER = "$env:DB_USER"
              DATABASE_PASSWORD = "$env:DB_PASSWORD"
              DATABASE_HOST = "$env:DB_HOST"
              DATABASE_PORT = "$env:DB_PORT"
          "@ | Set-Content -Path config.py -Encoding UTF8

      - name: Verify config.py
        shell: pwsh
        run: Get-Content config.py

      - name: Build exe
        run: |
          pyinstaller --onefile --windowed `
            --hidden-import=pymysql `
            --hidden-import=sqlalchemy.dialects.mysql `
            --hidden-import=sqlalchemy.ext.automap `
            --name YandexMapsScraper `
            main.py

      - uses: actions/upload-artifact@v4
        with:
          name: YandexMapsScraper-windows
          path: dist/YandexMapsScraper.exe
          retention-days: 30